services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      UV_PROJECT_ENVIRONMENT: /venv
      CHROME_PATH: /usr/bin/chromium
    command: >
      uv run streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.runOnSave=true
      --server.fileWatcherType=watchdog

  test:
    build: .
    volumes:
      - .:/app
    environment:
      UV_PROJECT_ENVIRONMENT: /venv
      CHROME_PATH: /usr/bin/chromium
    command: uv run pytest tests/ -v
    profiles: [test]
