# config/sources.yaml
#
# Data sources displayed in the "Data sources" section of every canton page.
# To add, remove, or update a source: edit this file and re-run
# scripts/generate_site.py. No Python code change is required.
#
# Fields per entry:
#   title    – Short descriptive title shown as the link text.
#   url      – Permalink to the resource (must be a complete URL).
#   provider – Organisation that publishes the resource.

data_sources:

  - title: "Drought warning map"
    url: "https://api3.geo.admin.ch/rest/services/api/MapServer/ch.bafu.trockenheitswarnkarte"
    provider: "BAFU"

  - title: "Drought data (numeric)"
    url: "https://data.geo.admin.ch/browser/index.html#/collections/ch.bafu.trockenheitsdaten-numerisch"
    provider: "BAFU"

  - title: "Recommended terminology for drought bulletins"
    url: "https://s3.govtech.digisus-lab.ch/govtech/uploads/14/L2SYQ/U8YQGX7S.pdf"
    provider: "BAFU / MeteoSchweiz"

  - title: "Drought warnings and behavioural recommendations"
    url: "https://www.trockenheit.admin.ch/de/trockenheit/trockenheitswarnungen-und-verhaltensempfehlungen"
    provider: "BAFU"
